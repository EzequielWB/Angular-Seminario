
<div class="d-flex justify-content-center align-items-center">
  <button class="btn btn-outline-danger btn-sm" (click)="downQuantity()">-</button>

  <input type="number" class="form-control form-control-sm text-center mx-2"
         [(ngModel)]="quantity" style="width: 60px;" readonly>

  <button class="btn btn-outline-success btn-sm" (click)="upQuantity()">+</button>
</div>
